kube-prometheus-stack:
  fullnameOverride: prometheus



raw:
  resources:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: prometheus
      spec:
        parentRefs:
          - name: istio-ingressgateway
            namespace: istio-system
        hostnames:
          - "prom.in.demo.opspresso.com"
        rules:
          - backendRefs:
              - name: prometheus-prometheus
                port: 9090