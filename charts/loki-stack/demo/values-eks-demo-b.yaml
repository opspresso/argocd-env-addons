loki-stack:
  loki:
    fullnameOverride: loki

    serviceMonitor:
      enabled: False
      additionalLabels:
        release: prometheus-eks-demo-b



raw:
  resources:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: loki
      spec:
        parentRefs:
          - name: istio-ingressgateway
            namespace: istio-system
        hostnames:
          - "loki.in.demo.opspresso.com"
        rules:
          - backendRefs:
              - name: loki
                port: 3100